<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drawings 结构解析</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f1116;
      color: #e4e7ec;
    }
    header {
      position: fixed;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 25px 16px;
      background: url(./images/header.svg), #362018;
      background-repeat: repeat-x;
    }
    strong { font-weight: 600; }
    #status {
      margin-left: auto;
      opacity: 0.85;
      font-size: 13px;
    }
    #log-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(0,0,0,0.85);
      color: #8ae234;
      font-family: monospace;
      font-size: 12px;
      z-index: 100;
      border-top: 1px solid #2e3440;
    }
    #log-panel .log-error { color: #ef2929; }
    #log-panel .log-warn { color: #fce94f; }
    #log-panel .log-info { color: #8ae234; }
    canvas {
      flex: 1;
      display: block;
      width: 100%;
      background: #0b0d12;
    }
  </style>
</head>
<body>
  <header>
    <div><strong>Drawings 结构解析</strong></div>
    <select id="create-select" title="机械动力 版本"></select>
    <select id="minecraft-select" title="Minecraft 版本"></select>
    <label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;user-select:none">
      <input type="checkbox" id="animate-kinetics" checked /> 动力学动画（Beta）
    </label>
    <label id="grid-toggle" style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;user-select:none">
      <input type="checkbox" id="show-grid" checked /> 网格
    </label>
    <input type="file" id="nbt-input" accept=".nbt,.litematic" />
    <span id="status">选择一个 NBT 或 Litematic 文件，支持 机械动力 蓝图</span>
  </header>
  <canvas id="viewport" style="width: 100%;height: 100%;"></canvas>
  <div id="log-panel"></div>
  <script type="module" src="/main.ts"></script>
</body>
</html>
